name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly CVE sweep: catches new advisories even when nothing is pushed.
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest

  e2e:
    # Browser smoke test for the JavaScript-driven behaviour the unit tests
    # cannot exercise (pagination, print button, report pages).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Install browser
        run: python -m playwright install --with-deps chromium
      - name: Run end-to-end smoke test
        run: python scripts/verify_e2e.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Static security analysis (bandit)
        run: bandit -r app -c pyproject.toml
      - name: Dependency vulnerability audit (pip-audit)
        # Non-blocking on pushes/PRs so a fresh advisory doesn't break
        # unrelated work; the weekly scheduled run fails hard instead.
        continue-on-error: ${{ github.event_name != 'schedule' }}
        run: pip-audit
