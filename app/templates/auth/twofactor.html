{% extends "base.html" %}
{% block title %}{{ t('twofa.challenge.title') }}{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>{{ t('twofa.challenge.title') }}</h1>
  <p class="muted">{{ t('twofa.challenge.hint') }}</p>
  {% if error %}<p class="alert alert-error">{{ t(error) }}</p>{% endif %}
  <form method="post" action="/login/2fa">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t('twofa.code') }}
      <input type="text" name="code" autocomplete="one-time-code"
             maxlength="12" required autofocus>
    </label>
    <button class="btn btn-primary" type="submit">{{ t('twofa.verify') }}</button>
  </form>
  <form method="post" action="/logout" class="inline-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button class="btn btn-sm" type="submit">{{ t('common.cancel') }}</button>
  </form>
</div>
{% endblock %}
