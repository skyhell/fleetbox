{% extends "base.html" %}
{% block title %}{{ t('expense.edit') }}{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>{{ t('expense.edit') }} — {{ vehicle.display_name }}</h1>
  <form method="post" action="/vehicles/{{ vehicle.id }}/expenses/{{ expense.id }}/edit">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-row">
      <label>{{ t('expense.field.category') }}
        <select name="category">
          {% for c in ExpenseCategory %}
          <option value="{{ c.value }}" {{ 'selected' if expense.category == c else '' }}>{{ t('expense.category.' + c.value) }}</option>
          {% endfor %}
        </select>
      </label>
      <label>{{ t('expense.field.title') }} <span class="req">*</span>
        <input type="text" name="title" required value="{{ expense.title }}">
      </label>
    </div>
    <div class="form-row">
      <label>{{ t('expense.field.date') }} <span class="req">*</span>
        <input type="date" name="spent_on" required value="{{ expense.spent_on.isoformat() }}">
      </label>
      <label>{{ t('expense.field.amount') }}
        <input type="text" name="amount" inputmode="decimal" value="{{ '%.2f'|format(expense.amount) }}">
      </label>
    </div>
    <label>{{ t('expense.field.notes') }}
      <textarea name="notes" rows="2">{{ expense.notes or '' }}</textarea>
    </label>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">{{ t('common.save') }}</button>
      <a class="btn" href="/vehicles/{{ vehicle.id }}">{{ t('common.cancel') }}</a>
    </div>
  </form>
</div>
{% endblock %}
